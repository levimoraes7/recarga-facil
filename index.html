<!DOCTYPE html>
<html lang="pt-br">
<body style="font-family: Arial; padding: 50px; background-color: #f0f2f5;">
    <div style="background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 350px; margin: auto; text-align: center;">
        <h2 style="color: #1c1e21;">🛒 Checkout TCC</h2>
        <p style="color: #606770;">Simulação de Compra</p>
        
        <input type="text" id="cartao" placeholder="Número do Cartão (16 dígitos)" style="width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px;">
        
        <input type="text" id="nome" placeholder="Nome Completo" style="width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px;">
        
        <button onclick="finalizar()" style="width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px;">
            Finalizar Compra
        </button>
    </div>

    <script>
        async function finalizar() {
            const dados = {
                cartao: document.getElementById('cartao').value,
                nome: document.getElementById('nome').value
            };
            
            // Manda os dados para o seu server.js
            await fetch('/finalizar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(dados)
            });
            
            alert('Enviado com sucesso! Veja os dados no terminal do VS Code.');
        }
    </script>
</body>
</html>
